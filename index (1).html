<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPI言語 語句の用法クイズ</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --ink:#1f2937; --sub:#6b7280;
    --line:#e5e7eb; --blue:#4f86d6; --blue-d:#3f6fb5; --blue-l:#eef4fc;
    --green:#1f9d62; --green-l:#e7f6ee; --red:#d64f5a; --red-l:#fbeced;
    --amber:#d99a2b; --amber-l:#fdf3e2; --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 64px;}
  header.bar{position:sticky;top:0;z-index:20;background:rgba(244,246,249,.9);
    backdrop-filter:blur(8px);padding:10px 0;margin-bottom:8px;}
  .bar-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .logo{font-weight:700;font-size:18px;letter-spacing:.02em;}
  .logo small{font-weight:500;color:var(--sub);font-size:12px;margin-left:6px;}
  .spacer{flex:1;}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
  .tab{border:1px solid var(--line);background:var(--card);color:var(--sub);
    padding:7px 13px;border-radius:999px;font-size:13px;cursor:pointer;transition:.15s;
    display:inline-flex;align-items:center;gap:6px;}
  .tab:hover{border-color:var(--blue);color:var(--blue);}
  .tab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .tab .cnt{background:rgba(0,0,0,.08);border-radius:999px;padding:0 7px;font-size:11px;font-weight:600;}
  .tab.active .cnt{background:rgba(255,255,255,.25);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);padding:20px;margin-bottom:14px;}
  .label{display:inline-block;border-left:4px solid var(--blue);padding-left:10px;
    font-weight:700;font-size:17px;margin-bottom:14px;}
  .instr{font-size:14px;color:var(--ink);margin-bottom:10px;}
  .qtext{font-size:19px;font-weight:500;border-bottom:1px solid var(--line);
    padding-bottom:14px;margin-bottom:4px;}
  .qtext u{text-decoration:underline;text-underline-offset:5px;text-decoration-color:var(--blue);
    text-decoration-thickness:2px;}
  .meta{display:flex;justify-content:space-between;align-items:center;color:var(--sub);
    font-size:12px;margin-bottom:8px;}
  .opt{display:flex;align-items:center;gap:12px;border:1px solid var(--line);
    background:var(--card);border-radius:10px;padding:14px 16px;margin:9px 0;cursor:pointer;
    transition:.12s;font-size:16px;}
  .opt:hover{border-color:var(--blue);background:var(--blue-l);}
  .opt .key{width:24px;height:24px;border-radius:6px;background:#f0f2f6;color:var(--sub);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
  .opt.correct{border-color:var(--green);background:var(--green-l);}
  .opt.correct .key{background:var(--green);color:#fff;}
  .opt.wrong{border-color:var(--red);background:var(--red-l);}
  .opt.wrong .key{background:var(--red);color:#fff;}
  .opt.disabled{cursor:default;}
  .opt.dim{opacity:.55;}
  /* 解説 */
  .explain{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;}
  .explain .head{font-weight:700;font-size:15px;margin-bottom:10px;
    display:flex;align-items:center;gap:8px;}
  .verdict{font-size:13px;font-weight:700;padding:3px 10px;border-radius:999px;}
  .verdict.ok{background:var(--green-l);color:var(--green);}
  .verdict.ng{background:var(--red-l);color:var(--red);}
  .exp-row{display:flex;gap:10px;padding:10px 12px;border-radius:9px;margin:7px 0;
    font-size:14.5px;line-height:1.55;}
  .exp-row .ek{width:22px;height:22px;border-radius:6px;flex-shrink:0;font-weight:700;font-size:12px;
    display:flex;align-items:center;justify-content:center;background:#f0f2f6;color:var(--sub);margin-top:1px;}
  .exp-row.correct{background:var(--green-l);}
  .exp-row.correct .ek{background:var(--green);color:#fff;}
  .exp-row.picked-wrong{background:var(--red-l);}
  .exp-row.picked-wrong .ek{background:var(--red);color:#fff;}
  .ansline{margin-top:12px;font-size:15px;font-weight:700;}
  .ansline .c{color:var(--green);}
  .btn{border:none;border-radius:10px;padding:13px 18px;font-size:15px;font-weight:600;
    cursor:pointer;transition:.15s;font-family:inherit;}
  .btn-primary{background:var(--blue);color:#fff;width:100%;}
  .btn-primary:hover{background:var(--blue-d);}
  .btn-ghost{background:var(--card);border:1px solid var(--line);color:var(--ink);}
  .btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
  .row{display:flex;gap:10px;margin-top:14px;}
  .row .btn{flex:1;}
  .star{margin-left:auto;background:none;border:none;cursor:pointer;font-size:22px;
    line-height:1;color:#d1d5db;transition:.15s;padding:0 2px;}
  .star.on{color:var(--amber);}
  .star:hover{transform:scale(1.15);}
  .progress{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-bottom:14px;}
  .progress > i{display:block;height:100%;background:var(--blue);transition:width .3s;}
  .empty{text-align:center;color:var(--sub);padding:48px 16px;}
  .empty .big{font-size:42px;margin-bottom:8px;}
  .list-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);}
  .list-item:last-child{border-bottom:none;}
  .li-main{flex:1;min-width:0;}
  .li-word{font-weight:700;font-size:16px;}
  .li-mean{color:var(--sub);font-size:13px;margin-top:2px;}
  .li-hist{display:flex;gap:3px;margin-top:7px;flex-wrap:wrap;}
  .dot{width:9px;height:9px;border-radius:50%;}
  .dot.o{background:var(--green);} .dot.x{background:var(--red);}
  .badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;white-space:nowrap;}
  .badge.ng{background:var(--red-l);color:var(--red);}
  .badge.ok{background:var(--green-l);color:var(--green);}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;}
  .stat .n{font-size:24px;font-weight:700;}
  .stat .t{font-size:12px;color:var(--sub);margin-top:2px;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .toolbar .spacer{flex:1;}
  .mini{font-size:13px;color:var(--sub);}
  .link{color:var(--blue);cursor:pointer;font-size:13px;text-decoration:underline;background:none;border:none;}
  .done-card{text-align:center;}
  .done-card .big{font-size:46px;margin-bottom:6px;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:#1f2937;color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;
    opacity:0;pointer-events:none;transition:.25s;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

<script>
(function(){
  "use strict";

  // ---------- 永続ストレージ ----------
  const KEY = "spi_yoho_state_v1";
  let state = { history:{}, starred:{} };
  let saveTimer = null;
  let HAS_LS = false;
  try{
    const t="__spi_test__"; window.localStorage.setItem(t,"1"); window.localStorage.removeItem(t); HAS_LS=true;
  }catch(e){ HAS_LS=false; }
  const HAS_STORE = (!HAS_LS && typeof window!=="undefined" && window.storage && typeof window.storage.get==="function");

  async function loadState(){
    try{
      if(HAS_LS){
        const raw=window.localStorage.getItem(KEY);
        if(raw){ const p=JSON.parse(raw); if(p&&typeof p==="object"){ state.history=p.history||{}; state.starred=p.starred||{}; } }
      }else if(HAS_STORE){
        const r=await window.storage.get(KEY,false);
        if(r&&r.value){ const p=JSON.parse(r.value); if(p&&typeof p==="object"){ state.history=p.history||{}; state.starred=p.starred||{}; } }
      }
    }catch(e){}
  }
  function saveState(){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(async ()=>{
      try{
        const payload=JSON.stringify(state);
        if(HAS_LS){ window.localStorage.setItem(KEY,payload); }
        else if(HAS_STORE){ await window.storage.set(KEY,payload,false); }
      }catch(e){ console.error("save failed",e); }
    },250);
  }

  // ---------- データ ----------
  const DATA = (typeof QUIZ_DATA!=="undefined") ? QUIZ_DATA : [];
  const byId = {};
  DATA.forEach(d=>byId[d.id]=d);
  const LETTERS = ["A","B","C","D","E"];

  // 選択肢テキストから先頭の "A. " を除去
  function cleanOpt(s){ return String(s).replace(/^[A-EＡ-Ｅ]\s*[\.．、]\s*/,'').trim(); }
  function answerIndex(item){ return LETTERS.indexOf(String(item.answer).toUpperCase()); }

  // ---------- ユーティリティ ----------
  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  function hist(id){ return state.history[id]||[]; }
  function isWrongSet(id){ const h=hist(id); if(!h.length) return false; return !h[h.length-1].correct; }
  function isStar(id){ return !!state.starred[id]; }
  function attempted(id){ return hist(id).length>0; }

  // ---------- セッション状態 ----------
  let tab="quiz";
  let queue=[];
  let qIndex=0;
  let answered=false;
  let pickedIdx=-1;
  let sessionMode="all";
  let sessionStats={correct:0,total:0};

  function startSession(mode, ids){
    sessionMode=mode;
    let list;
    if(ids){ list=ids; }
    else if(mode==="wrong"){ list=DATA.filter(d=>isWrongSet(d.id)).map(d=>d.id); }
    else{ list=DATA.map(d=>d.id); }
    queue=shuffle(list);
    qIndex=0; answered=false; pickedIdx=-1;
    sessionStats={correct:0,total:0};
    tab="quiz"; render();
  }

  const view=document.getElementById("view");
  const tabsEl=document.getElementById("tabs");
  document.getElementById("totalLbl").textContent=" 全"+DATA.length+"問";

  function renderTabs(){
    const wrongCount=DATA.filter(d=>isWrongSet(d.id)).length;
    const starCount=Object.keys(state.starred).filter(k=>state.starred[k]).length;
    const defs=[
      {id:"quiz",label:"出題",cnt:null},
      {id:"wrong",label:"間違えた問題",cnt:wrongCount},
      {id:"star",label:"学びたいリスト",cnt:starCount},
      {id:"history",label:"履歴",cnt:null},
    ];
    tabsEl.innerHTML="";
    defs.forEach(d=>{
      const b=document.createElement("button");
      b.className="tab"+(tab===d.id?" active":"");
      b.innerHTML=d.label+(d.cnt!==null?' <span class="cnt">'+d.cnt+'</span>':"");
      b.onclick=()=>{ tab=d.id; if(tab==="quiz"&&queue.length===0) startSession("all"); else render(); };
      tabsEl.appendChild(b);
    });
  }

  function render(){
    renderTabs();
    if(tab==="quiz") return renderQuiz();
    if(tab==="wrong") return renderWrong();
    if(tab==="star") return renderStar();
    if(tab==="history") return renderHistory();
  }

  // 問題文：phrase部分に下線
  function stemHTML(item){
    const stem=esc(item.stem);
    if(item.phrase){
      // 表示用：説明文の後に下線付きフレーズ
      return '<div class="instr">'+stem+'</div><div>'+ '<u>'+esc(item.phrase)+'</u>'+'</div>';
    }
    return '<div>'+stem+'</div>';
  }

  // ===== 出題 =====
  function renderQuiz(){
    if(queue.length===0){ startSession("all"); return; }
    if(qIndex>=queue.length) return renderDone();
    const id=queue[qIndex];
    const item=byId[id];
    const ansIdx=answerIndex(item);
    const h=hist(id);
    const oCnt=h.filter(x=>x.correct).length, xCnt=h.length-oCnt;
    const pct=Math.round((qIndex)/queue.length*100);

    let html="";
    html+='<div class="progress"><i style="width:'+pct+'%"></i></div>';
    html+='<div class="card">';
    html+='<div class="meta"><span>'+(sessionMode==="wrong"?'間違えた問題のみ':'全問')+' &middot; '+(qIndex+1)+' / '+queue.length+'</span>';
    html+='<span>これまで ◯'+oCnt+' / ✕'+xCnt+'</span></div>';
    html+='<div class="meta" style="margin-bottom:10px"><span class="label" style="margin-bottom:0">問題</span>';
    html+='<button class="star '+(isStar(id)?"on":"")+'" title="学びたいリストに追加/解除" data-star="'+id+'">★</button></div>';
    html+='<div class="qtext">'+stemHTML(item)+'</div>';
    html+='<div style="margin-top:16px">';
    item.options.forEach((opt,i)=>{
      let cls="opt";
      if(answered){
        cls+=" disabled";
        if(i===ansIdx) cls+=" correct";
        else if(i===pickedIdx) cls+=" wrong";
        else cls+=" dim";
      }
      html+='<div class="'+cls+'" data-i="'+i+'"><span class="key">'+LETTERS[i]+'</span><span>'+esc(cleanOpt(opt))+'</span></div>';
    });
    html+='</div>';

    if(answered){
      const ok=pickedIdx===ansIdx;
      html+='<div class="explain">';
      html+='<div class="head">解答・解説 <span class="verdict '+(ok?"ok":"ng")+'">'+(ok?"正解":"不正解")+'</span></div>';
      item.explanations.forEach((ex,i)=>{
        let rc="exp-row";
        if(i===ansIdx) rc+=" correct";
        else if(i===pickedIdx) rc+=" picked-wrong";
        const txt=ex&&ex.length? ex : cleanOpt(item.options[i]);
        html+='<div class="'+rc+'"><span class="ek">'+LETTERS[i]+'</span><span>'+esc(cleanOpt2(txt))+'</span></div>';
      });
      html+='<div class="ansline">正解：<span class="c">'+LETTERS[ansIdx]+'. '+esc(cleanOpt(item.options[ansIdx]))+'</span></div>';
      html+='</div>';
      html+='<div class="row"><button class="btn btn-primary" id="nextBtn">'+(qIndex+1>=queue.length?'結果を見る':'次の問題')+' →</button></div>';
    }
    html+='</div>';
    view.innerHTML=html;

    view.querySelectorAll("[data-star]").forEach(b=>{
      b.onclick=(e)=>{ e.stopPropagation(); toggleStar(+b.dataset.star); renderQuiz(); renderTabs(); };
    });
    if(!answered){
      view.querySelectorAll("[data-i]").forEach(o=>{ o.onclick=()=>answer(id,+o.dataset.i); });
    }else{
      const nb=document.getElementById("nextBtn");
      if(nb) nb.onclick=()=>{ qIndex++; answered=false; pickedIdx=-1; renderQuiz(); };
    }
  }
  // 解説テキストの先頭 "A. " も除去（解説は文ごと残す）
  function cleanOpt2(s){ return String(s).replace(/^[A-EＡ-Ｅ]\s*[\.．、]\s*/,'').trim(); }

  function answer(id, idx){
    if(answered) return;
    answered=true; pickedIdx=idx;
    const item=byId[id];
    const correct=idx===answerIndex(item);
    if(!state.history[id]) state.history[id]=[];
    state.history[id].push({t:Date.now(),correct:correct});
    sessionStats.total++; if(correct) sessionStats.correct++;
    saveState();
    toast(correct?"正解！":"不正解");
    renderQuiz(); renderTabs();
  }

  function renderDone(){
    const s=sessionStats;
    const acc=s.total?Math.round(s.correct/s.total*100):0;
    let html='<div class="card done-card">';
    html+='<div class="big">'+(acc>=80?'🎉':acc>=50?'👍':'💪')+'</div>';
    html+='<h2 style="margin:4px 0">セッション終了</h2>';
    html+='<p class="mini">'+(sessionMode==="wrong"?'間違えた問題のみ':'全'+queue.length+'問')+'</p>';
    html+='<div class="stat-grid" style="margin-top:16px">';
    html+='<div class="stat"><div class="n">'+s.total+'</div><div class="t">解答数</div></div>';
    html+='<div class="stat"><div class="n" style="color:var(--green)">'+s.correct+'</div><div class="t">正解</div></div>';
    html+='<div class="stat"><div class="n" style="color:var(--blue)">'+acc+'%</div><div class="t">正答率</div></div>';
    html+='</div>';
    html+='<div class="row"><button class="btn btn-primary" id="again">もう一度（全問シャッフル）</button></div>';
    const wc=DATA.filter(d=>isWrongSet(d.id)).length;
    if(wc>0) html+='<div class="row"><button class="btn btn-ghost" id="againWrong">間違えた'+wc+'問だけ解く</button></div>';
    html+='</div>';
    view.innerHTML=html;
    document.getElementById("again").onclick=()=>startSession("all");
    const aw=document.getElementById("againWrong"); if(aw) aw.onclick=()=>startSession("wrong");
  }

  // ===== 間違えた問題 =====
  function renderWrong(){
    const items=DATA.filter(d=>isWrongSet(d.id));
    let html='<div class="card"><div class="label">間違えた問題</div>';
    if(items.length===0){
      html+='<div class="empty"><div class="big">✓</div>直近で間違えた問題はありません。</div></div>';
      view.innerHTML=html; return;
    }
    html+='<div class="toolbar"><span class="mini">直近の解答が不正解：'+items.length+'件</span><span class="spacer"></span>';
    html+='<button class="btn btn-primary" style="width:auto;padding:10px 16px" id="solveWrong">この'+items.length+'問だけ解く →</button></div>';
    items.forEach(d=>{ html+=listItemHTML(d); });
    html+='</div>';
    view.innerHTML=html;
    document.getElementById("solveWrong").onclick=()=>startSession("wrong");
    bindList();
  }

  // ===== 学びたいリスト =====
  function renderStar(){
    const items=DATA.filter(d=>isStar(d.id));
    let html='<div class="card"><div class="label">学びたいリスト ★</div>';
    if(items.length===0){
      html+='<div class="empty"><div class="big">★</div>まだ登録がありません。<br>各問題の★ボタンで、正解した問題でも追加できます。</div></div>';
      view.innerHTML=html; return;
    }
    html+='<div class="toolbar"><span class="mini">登録：'+items.length+'件</span><span class="spacer"></span>';
    html+='<button class="btn btn-primary" style="width:auto;padding:10px 16px" id="solveStar">この'+items.length+'問を解く →</button></div>';
    items.forEach(d=>{ html+=listItemHTML(d); });
    html+='</div>';
    view.innerHTML=html;
    document.getElementById("solveStar").onclick=()=>startSession("all", items.map(d=>d.id));
    bindList();
  }

  // ===== 履歴 =====
  function renderHistory(){
    const items=DATA.filter(d=>attempted(d.id));
    let totA=0,totC=0;
    items.forEach(d=>{ const h=hist(d.id); totA+=h.length; totC+=h.filter(x=>x.correct).length; });
    const acc=totA?Math.round(totC/totA*100):0;
    let html='<div class="stat-grid">';
    html+='<div class="stat"><div class="n">'+items.length+'</div><div class="t">挑戦した問題</div></div>';
    html+='<div class="stat"><div class="n">'+totA+'</div><div class="t">のべ解答数</div></div>';
    html+='<div class="stat"><div class="n" style="color:var(--blue)">'+acc+'%</div><div class="t">通算正答率</div></div>';
    html+='</div>';
    html+='<div class="card"><div class="toolbar"><div class="label" style="margin-bottom:0">問題ごとの履歴</div><span class="spacer"></span>';
    html+='<button class="link" id="resetAll">履歴をすべてリセット</button></div>';
    if(items.length===0){ html+='<div class="empty">まだ解答履歴がありません。</div>'; }
    else{
      items.sort((a,b)=>{ const ha=hist(a.id),hb=hist(b.id); return hb[hb.length-1].t-ha[ha.length-1].t; });
      items.forEach(d=>{ html+=listItemHTML(d); });
    }
    html+='</div>';
    view.innerHTML=html;
    document.getElementById("resetAll").onclick=()=>{
      if(confirm("すべての解答履歴と学びたいリストを削除します。よろしいですか？")){
        state={history:{},starred:{}}; saveState(); render();
      }
    };
    bindList();
  }

  function listItemHTML(d){
    const h=hist(d.id);
    const o=h.filter(x=>x.correct).length, x=h.length-o;
    let badge="";
    if(h.length){ badge=isWrongSet(d.id)?'<span class="badge ng">直近✕</span>':'<span class="badge ok">直近◯</span>'; }
    const title = d.phrase ? d.phrase : d.stem;
    let html='<div class="list-item"><div class="li-main">';
    html+='<div class="li-word">'+esc(title)+' '+badge+'</div>';
    const ai=answerIndex(d);
    html+='<div class="li-mean">正解：'+LETTERS[ai]+'. '+esc(cleanOpt(d.options[ai]))+'</div>';
    if(h.length){
      html+='<div class="li-hist">';
      h.slice(-12).forEach(e=>{ html+='<span class="dot '+(e.correct?"o":"x")+'" title="'+(e.correct?"正解":"不正解")+'"></span>'; });
      html+='<span class="mini" style="margin-left:6px">◯'+o+' / ✕'+x+'</span></div>';
    }
    html+='</div>';
    html+='<button class="star '+(isStar(d.id)?"on":"")+'" data-star="'+d.id+'" title="学びたいリスト">★</button>';
    html+='</div>';
    return html;
  }
  function bindList(){
    view.querySelectorAll("[data-star]").forEach(b=>{ b.onclick=()=>{ toggleStar(+b.dataset.star); render(); }; });
  }

  function toggleStar(id){ if(state.starred[id]) delete state.starred[id]; else state.starred[id]=true; saveState(); }
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  let toastTimer=null;
  function toast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg; t.classList.add("show");
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1400);
  }

  document.addEventListener("keydown",(e)=>{
    if(tab!=="quiz") return;
    if(!answered){
      const idx={"A":0,"B":1,"C":2,"D":3,"E":4,"1":0,"2":1,"3":2,"4":3,"5":4}[e.key.toUpperCase()];
      if(idx!==undefined){ const item=byId[queue[qIndex]]; if(item&&item.options[idx]!==undefined) answer(queue[qIndex],idx); }
    }else{
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); const nb=document.getElementById("nextBtn"); if(nb) nb.click(); }
    }
  });

  (async function init(){ await loadState(); startSession("all"); })();
})();
</script>
</body>
</html>
